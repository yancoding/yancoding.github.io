<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E4EEF3"/>
      <stop offset="1" stop-color="#D1E0E9"/>
    </linearGradient>
    <linearGradient id="term2" x1="120" y1="80" x2="1080" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17191F"/>
      <stop offset="1" stop-color="#0D0F13"/>
    </linearGradient>
    <filter id="shadow2" x="70" y="50" width="1060" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#335A71" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg2)"/>
  <g filter="url(#shadow2)">
    <rect x="110" y="80" width="980" height="600" rx="28" fill="url(#term2)"/>
    <rect x="110" y="80" width="980" height="52" rx="28" fill="#2A2D34"/>
    <rect x="110" y="106" width="980" height="26" fill="#2A2D34"/>
    <circle cx="148" cy="106" r="8" fill="#FF5F57"/>
    <circle cx="176" cy="106" r="8" fill="#FEBC2E"/>
    <circle cx="204" cy="106" r="8" fill="#28C840"/>
    <text x="600" y="112" text-anchor="middle" fill="#D6DAE3" font-size="20" font-family="Menlo, Monaco, Consolas, monospace">MacBook-Pro: ~</text>
    <text x="155" y="182" fill="#8BE9FD" font-size="30" font-family="Menlo, Monaco, Consolas, monospace">$ brew install colima</text>
    <text x="155" y="232" fill="#8BE9FD" font-size="30" font-family="Menlo, Monaco, Consolas, monospace">$ colima start</text>
    <text x="155" y="282" fill="#A6E3A1" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">INFO[0000] starting colima</text>
    <text x="155" y="324" fill="#A6E3A1" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">INFO[0018] runtime: docker</text>
    <text x="155" y="396" fill="#8BE9FD" font-size="30" font-family="Menlo, Monaco, Consolas, monospace">$ docker run --rm hello-world</text>
    <text x="155" y="448" fill="#F9E2AF" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">Hello from Docker!</text>
    <text x="155" y="498" fill="#D5D8E1" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">This message shows that your installation appears to be working correctly.</text>
    <rect x="710" y="210" width="280" height="300" rx="18" fill="#101217" stroke="#3C414D"/>
    <text x="850" y="258" text-anchor="middle" fill="#CBA6F7" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">本地运行关系</text>
    <text x="760" y="320" fill="#D5D8E1" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">docker CLI</text>
    <text x="810" y="360" fill="#8BE9FD" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">↓</text>
    <text x="760" y="408" fill="#D5D8E1" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">colima runtime</text>
    <text x="810" y="448" fill="#8BE9FD" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">↓</text>
    <text x="760" y="494" fill="#D5D8E1" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">容器运行环境</text>
    <text x="155" y="594" fill="#F38BA8" font-size="26" font-family="Menlo, Monaco, Consolas, monospace"># 不装 Docker Desktop 也能在本机执行 docker run</text>
  </g>
</svg>
