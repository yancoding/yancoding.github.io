<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8E4F2"/>
      <stop offset="1" stop-color="#D8D1E8"/>
    </linearGradient>
    <linearGradient id="term3" x1="100" y1="80" x2="1100" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1C22"/>
      <stop offset="1" stop-color="#0F1014"/>
    </linearGradient>
    <filter id="shadow3" x="60" y="50" width="1080" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#584975" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg3)"/>
  <g filter="url(#shadow3)">
    <rect x="90" y="80" width="1020" height="600" rx="28" fill="url(#term3)"/>
    <rect x="90" y="80" width="1020" height="52" rx="28" fill="#2A2D34"/>
    <rect x="90" y="106" width="1020" height="26" fill="#2A2D34"/>
    <circle cx="128" cy="106" r="8" fill="#FF5F57"/>
    <circle cx="156" cy="106" r="8" fill="#FEBC2E"/>
    <circle cx="184" cy="106" r="8" fill="#28C840"/>
    <text x="600" y="112" text-anchor="middle" fill="#D6DAE3" font-size="20" font-family="Menlo, Monaco, Consolas, monospace">MacBook-Pro: ~</text>
    <text x="140" y="186" fill="#8BE9FD" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">$ docker context create remote-server --docker "host=tcp://192.168.1.10:2375"</text>
    <text x="140" y="236" fill="#A6E3A1" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">remote-server</text>
    <text x="140" y="304" fill="#8BE9FD" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">$ docker context use remote-server</text>
    <text x="140" y="354" fill="#F9E2AF" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">remote-server</text>
    <text x="140" y="422" fill="#8BE9FD" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">$ docker context ls</text>
    <text x="140" y="478" fill="#D5D8E1" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">NAME              DESCRIPTION      DOCKER ENDPOINT                  CURRENT</text>
    <text x="140" y="518" fill="#D5D8E1" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">default                              unix:///var/run/docker.sock</text>
    <text x="140" y="558" fill="#CBA6F7" font-size="24" font-family="Menlo, Monaco, Consolas, monospace">remote-server                        tcp://192.168.1.10:2375        *</text>
    <text x="140" y="620" fill="#F38BA8" font-size="26" font-family="Menlo, Monaco, Consolas, monospace"># 适合只装 CLI，然后把命令发到远程 Linux Docker 主机</text>
  </g>
</svg>
