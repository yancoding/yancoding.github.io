<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4E8D8"/>
      <stop offset="1" stop-color="#E8D8C3"/>
    </linearGradient>
    <linearGradient id="terminal" x1="160" y1="110" x2="1040" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E1E22"/>
      <stop offset="1" stop-color="#111216"/>
    </linearGradient>
    <filter id="shadow" x="110" y="70" width="980" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#6B4E2E" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="150" y="100" width="900" height="560" rx="26" fill="url(#terminal)"/>
    <rect x="150" y="100" width="900" height="54" rx="26" fill="#2B2D33"/>
    <rect x="150" y="128" width="900" height="26" fill="#2B2D33"/>
    <circle cx="190" cy="127" r="9" fill="#FF5F57"/>
    <circle cx="220" cy="127" r="9" fill="#FEBC2E"/>
    <circle cx="250" cy="127" r="9" fill="#28C840"/>
    <text x="600" y="133" text-anchor="middle" fill="#D5D8E1" font-size="20" font-family="Menlo, Monaco, Consolas, monospace">ubuntu@server: ~</text>
    <text x="190" y="210" fill="#8BE9FD" font-size="30" font-family="Menlo, Monaco, Consolas, monospace">$ sudo apt update</text>
    <text x="190" y="258" fill="#A6E3A1" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">Hit:1 http://archive.ubuntu.com/ubuntu noble InRelease</text>
    <text x="190" y="300" fill="#A6E3A1" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">Reading package lists... Done</text>
    <text x="190" y="372" fill="#8BE9FD" font-size="30" font-family="Menlo, Monaco, Consolas, monospace">$ sudo apt install catimg</text>
    <text x="190" y="420" fill="#F9E2AF" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">The following NEW packages will be installed:</text>
    <text x="190" y="462" fill="#F9E2AF" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">  catimg</text>
    <text x="190" y="504" fill="#F38BA8" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">Do you want to continue? [Y/n] Y</text>
    <text x="190" y="566" fill="#A6E3A1" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">Setting up catimg (2.7.0-1) ...</text>
    <text x="190" y="618" fill="#CBA6F7" font-size="28" font-family="Menlo, Monaco, Consolas, monospace">$ catimg -h</text>
    <text x="350" y="618" fill="#D5D8E1" font-size="28" font-family="Menlo, Monaco, Consolas, monospace"># 安装完成后查看帮助信息</text>
  </g>
</svg>
