<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAE5F4"/>
      <stop offset="1" stop-color="#D7CEE8"/>
    </linearGradient>
    <filter id="shadow" x="70" y="50" width="1060" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#564A70" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="100" y="80" width="1000" height="600" rx="28" fill="#FCFBFE"/>
    <text x="160" y="145" fill="#2D2A35" font-size="34" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">常见限流算法对比</text>

    <rect x="140" y="190" width="920" height="90" rx="16" fill="#F5F2FB" stroke="#D4CAE8"/>
    <text x="170" y="245" fill="#5B3FA7" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">固定窗口</text>
    <text x="380" y="245" fill="#333333" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">实现简单，但临界点容易有突刺</text>

    <rect x="140" y="300" width="920" height="90" rx="16" fill="#F2F8FF" stroke="#CADDF5"/>
    <text x="170" y="355" fill="#2167B8" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">滑动窗口</text>
    <text x="380" y="355" fill="#333333" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">更平滑，减少突刺，复杂度稍高</text>

    <rect x="140" y="410" width="920" height="90" rx="16" fill="#EFFAF1" stroke="#CBE7D1"/>
    <text x="170" y="465" fill="#2C8F46" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">令牌桶</text>
    <text x="380" y="465" fill="#333333" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">控平均速率，同时允许一定突发流量</text>

    <rect x="140" y="520" width="920" height="90" rx="16" fill="#FFF5EE" stroke="#F0D4BF"/>
    <text x="170" y="575" fill="#C76A20" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">漏桶</text>
    <text x="380" y="575" fill="#333333" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif">输出平稳，但突发请求容易排队</text>
  </g>
</svg>
